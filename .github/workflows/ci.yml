name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Resolved deps live in ./lib/ (gitignored); silence the cwd-shadows-version-pinned note.
  CYRIUS_NO_WARN_SHADOW_LIB: "1"

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # The cyrius.cyml `[package].cyrius` pin is the single source of
        # truth for the toolchain version — nothing is hardcoded in this
        # YAML. Hand the pin to the upstream installer, which fetches +
        # lays out $HOME/.cyrius/{bin,lib}: binaries (cycc / cyrius /
        # cyrfmt / cyrlint ...) plus the stdlib snapshot. Replaces the
        # hand-rolled tarball extraction used through 1.5.1 — that path
        # copied `bin/cc5`, which the 6.x toolchain renamed to `cycc`.
        # Same installer body as patra / bote / agnosys on 6.x.
        run: |
          set -e
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: cyrius --version

      - name: Sync stdlib
        # Cyrius does not auto-resolve stdlib (supply-chain safety): copy the
        # explicitly-declared `[deps] stdlib` subset from the pinned snapshot
        # into ./lib/ so the git-dep bundles' requirements resolve. Must run
        # before `cyrius deps`.
        run: cyrius lib sync

      - name: Resolve dependencies
        run: cyrius deps

      - name: Verify dep hashes
        run: |
          if [ -f cyrius.lock ]; then
            cyrius deps --verify
          else
            echo "::warning::cyrius.lock not committed — skipping hash verification"
          fi

      - name: Format check
        # `cyrius fmt <file>` writes formatted source to stdout; diff against
        # the committed file catches drift. `--check` only sets the exit
        # code without emitting output, so diffing its stdout always reports
        # spurious drift — same workaround as agnosys/agnostik.
        run: |
          fail=0
          for f in src/main.cyr src/lib/*.cyr tests/*.tcyr tests/*.bcyr fuzz/*.fcyr; do
            [ -f "$f" ] || continue
            if ! diff -q <(cyrius fmt "$f" 2>/dev/null) "$f" > /dev/null; then
              echo "needs fmt: $f"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "fmt: drift detected"; exit 1; }

      - name: Lint
        # Auto-discover src/ + fuzz/ modules. Treat any `warn ` line as a
        # failure on those. Test fixtures (tests/*.tcyr / *.bcyr) are
        # linted informationally — long-line warnings on verbatim
        # nftables-grammar fixtures are noise, not bugs.
        run: |
          fail=0
          for f in src/main.cyr src/lib/*.cyr fuzz/*.fcyr; do
            [ -f "$f" ] || continue
            out=$(cyrius lint "$f" 2>&1)
            echo "$out"
            if echo "$out" | grep -qE '^\s*warn '; then
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present in src/ or fuzz/"; exit 1; }
          echo "--- tests/ (informational) ---"
          for f in tests/*.tcyr tests/*.bcyr; do
            [ -f "$f" ] || continue
            cyrius lint "$f" 2>&1 | tail -3
          done

      - name: Vet (include-graph audit)
        run: cyrius vet src/main.cyr

      - name: Capacity
        # `cyrius capacity --check` doesn't follow arch-peer includes the
        # way `cyrius build` does, so it emits a false-positive
        # `undefined variable 'SYS_EXIT'` on src/main.cyr's exit-syscall
        # epilogue. The tool still exits 0 ("all caps under 85%"); treat
        # this step as informational until upstream resolves arch-peer
        # resolution.
        run: cyrius capacity --check src/main.cyr || true

      - name: Build (x86_64, DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/nein
          echo "nein (x86_64): $(wc -c < build/nein) bytes"

      - name: Type-check (CYRIUS_TYPE_CHECK=1)
        # Cyrius v5.10.26+ ships type-check default-on (cstring / Str
        # annotations on stdlib + nein's annotated surface). Filter stdlib
        # self-flags (`warning:lib/...`) and known-tracked
        # `large static data` (roadmap v1.3.0 — str_builder audit); any
        # OTHER nein-side warning fails the build. Tempfile routing
        # because $(...) drops null bytes from cyrius's stderr stream —
        # same workaround agnostik uses.
        run: |
          tmp=$(mktemp)
          CYRIUS_TYPE_CHECK=1 cyrius build src/main.cyr build/nein-tc > "$tmp" 2>&1
          if grep -E "^warning:" "$tmp" \
              | grep -vE "^warning:lib/" \
              | grep -v "large static data" \
              | head -1 | grep -q .; then
            echo "type-check: nein-side warnings present"
            grep -E "^warning:" "$tmp" \
              | grep -vE "^warning:lib/" \
              | grep -v "large static data"
            rm -f "$tmp"
            exit 1
          fi
          echo "type-check: no nein-side warnings"
          rm -f "$tmp"

      - name: Verify ELF
        run: xxd -l 4 build/nein | grep -q "7f45 4c46"

      - name: Cross-build aarch64
        # Best-effort: skip with a warning if cycc_aarch64 wasn't shipped
        # in the toolchain bundle for this CYRIUS_VERSION. (6.x renamed
        # the aarch64 backend cc5_aarch64 -> cycc_aarch64.)
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cycc_aarch64" ]; then
            echo "::warning::cycc_aarch64 not shipped with Cyrius $CYRIUS_VERSION — skipping aarch64 cross-build"
            exit 0
          fi
          CYRIUS_DCE=1 cyrius build --aarch64 src/main.cyr build/nein-aarch64
          file build/nein-aarch64 | grep -q "aarch64" || {
            echo "ERROR: nein-aarch64 is not aarch64 ELF"; exit 1; }
          echo "nein-aarch64: $(wc -c < build/nein-aarch64) bytes"

      - name: Smoke test
        run: |
          ./build/nein | tee /tmp/smoke
          grep -q "nein ready" /tmp/smoke

      - name: Test
        run: |
          fail=0
          for t in tests/*.tcyr; do
            [ -f "$t" ] || continue
            name=$(basename "$t" .tcyr)
            echo "=== $name ==="
            if ! cyrius test "$t"; then
              echo "FAIL: $name"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "test failures"; exit 1; }

      - name: Bench
        run: |
          for b in tests/*.bcyr; do
            [ -f "$b" ] || continue
            cyrius bench "$b"
          done

      - name: Fuzz
        # `cyrius fuzz` auto-discovers fuzz/*.fcyr harnesses, builds each,
        # and exits 0 only if every harness exits 0. Each harness is a
        # per-target driver: validate, config_parse, rule, nat, firewall.
        # Crash attribution is by harness name; CI surfaces failures via
        # the "X passed, Y failed" summary line.
        run: cyrius fuzz

      - name: Integration tests
        # tests/integration/*.tcyr exercise the apply layer (subprocess +
        # netlink) and the inspect parser on real-shape nft output. They
        # need root + nft for the live-apply assertions, but every
        # individual test classifies its outcome — on non-permissive hosts
        # the apply-related asserts pass through the
        # `code == ERR_PERMISSION_DENIED || ERR_NFT_FAILED` branch, the
        # pure-function asserts (path-pinning validation, parser shape)
        # still run, and the suite exits 0.
        #
        # CI runs unconditionally on each push. To exercise the live-apply
        # path against a real nft (which requires CAP_NET_ADMIN), set
        # `NEIN_INTEGRATION=1` and wrap with `sudo unshare -n` to isolate
        # in a fresh netns. The CI image doesn't have nft preinstalled in
        # default ubuntu-latest; the apply assertions then fall through
        # the permission-denied class as documented.
        run: |
          fail=0
          for t in tests/integration/*.tcyr; do
            [ -f "$t" ] || continue
            name=$(basename "$t" .tcyr)
            echo "=== integration: $name ==="
            if ! cyrius test "$t"; then
              echo "FAIL: $name"
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "integration: test failures"; exit 1; }

      - name: API surface snapshot gate
        # Diffs docs/api-surface.snapshot against the current nein public-fn
        # surface across src/main.cyr + src/lib/*.cyr. Fails on unexplained
        # adds/removes. Intentional API bumps regenerate via
        # `scripts/api-surface.sh update` and commit the new snapshot in
        # the same PR. Pattern lifted from agnostik 1.0.5+.
        run: scripts/api-surface.sh check

      - name: Bench-regression gate
        # Compares the current bench run against the most recent committed
        # baseline in docs/benchmarks/history.csv. Fails on per-bench
        # slowdown beyond threshold (50%/80% with abs floors). Skip via
        # [bench-regression-ack] in the HEAD commit message for intentional
        # perf trade-offs.
        run: scripts/bench-regression.sh

      - name: Verify dist bundle is in sync with src/
        # `cyrius distlib` reads [lib] modules from cyrius.cyml and writes
        # dist/nein.cyr — the single-file bundle consumer crates pull in
        # via `[deps.nein] modules = ["dist/nein.cyr"]`. The bundle is
        # tracked in git so consumers don't have to run distlib themselves;
        # this step verifies it's regenerated when [lib] or src/lib/*.cyr
        # change. Pattern lifted from agnosys / agnostik 1.2.x.
        run: |
          cyrius distlib
          cyrius distlib mcp
          for b in dist/nein.cyr dist/nein-mcp.cyr; do
            if ! git diff --quiet "$b" 2>/dev/null; then
              echo "ERROR: $b is stale. Run 'cyrius distlib' (+ 'cyrius distlib mcp') and commit."
              git --no-pager diff "$b" | head -40
              exit 1
            fi
          done
          echo "dist bundles (default + mcp) match src/"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        # Code-only matches (awk drops `#` comment lines via leading-char
        # check). apply.cyr's `/sbin/nft` execve is nein's reason for
        # existing — explicitly allowlisted; PATH-pinning hardening is
        # tracked in roadmap v1.4.0 ("nft binary discovery + pinning").
        run: |
          FAIL=0
          scan() {
            local label="$1"; shift
            local pat="$1"; shift
            local allow_file="${1:-}"
            local hits
            hits=$(grep -rn "$pat" src/ 2>/dev/null | awk -F: '
              { line=$3; for(i=4;i<=NF;i++) line=line":"$i;
                sub(/^[[:space:]]+/,"",line);
                if (substr(line,1,1) != "#") print $1":"$2":"line }')
            if [ -n "$allow_file" ]; then
              hits=$(echo "$hits" | grep -v "^$allow_file:" || true)
            fi
            if [ -n "$hits" ]; then
              echo "FAIL: $label"
              echo "$hits"
              FAIL=1
            fi
          }
          # `sys_system` is a hard fail anywhere — nein uses explicit
          # fork+pipe+execve via apply.cyr; the shell-quoting attack
          # surface is precisely what we're avoiding.
          scan "sys_system"   '\bsys_system\s*\('
          # Hardcoded writes to system path roots nein has no business
          # touching. /sbin reads from apply.cyr are allowlisted because
          # `/sbin/nft` execve is nein's whole point.
          scan "writes to /etc"  '"/etc/'
          scan "writes to /bin"  '"/bin/'
          scan "writes to /sbin" '"/sbin/' src/lib/apply.cyr
          # Large fn-scope buffers (cycc emits `var buf[N]` inside a fn as
          # STATIC DATA, not stack — consecutive calls share the backing
          # memory; any Str/buf borrow is invalidated by the next call).
          # >= 4 KB warns; >= 64 KB fails. Tracked in roadmap v1.3.0
          # ("str_builder audit").
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": FAIL large fn-scope buffer ("n" bytes): "$0
              else if (n >= 4096) print FILENAME":"NR": warn fn-scope buffer ("n" bytes): "$0
            }' src/lib/*.cyr src/main.cyr | tee /tmp/bigbuf.txt
          if grep -q "^.*: FAIL " /tmp/bigbuf.txt; then FAIL=1; fi
          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md CODE_OF_CONDUCT.md LICENSE CLAUDE.md cyrius.cyml docs/doc-health.md docs/development/roadmap.md docs/development/threat-model.md docs/development/capability-map.md; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in CHANGELOG.md"; exit 1; }
          echo "Version consistent (cyrius.cyml pulls VERSION via \${file:VERSION})"

      - name: Currency check (CHANGELOG + roadmap)
        # The current VERSION's CHANGELOG section must exist with an ISO
        # date that's not in the future. The roadmap's "Last refresh"
        # marker must be within the last 90 days. Doc-health is a
        # cross-link — surface it if stale by separate gate later.
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          TODAY=$(date -u +%Y-%m-%d)
          # CHANGELOG entry shape: `## [X.Y.Z] — YYYY-MM-DD`
          CL_LINE=$(grep -E "^## \[$VERSION\] — [0-9]{4}-[0-9]{2}-[0-9]{2}" CHANGELOG.md || true)
          if [ -z "$CL_LINE" ]; then
            echo "FAIL: CHANGELOG.md has no dated entry for $VERSION"
            echo "Expected line: '## [$VERSION] — YYYY-MM-DD'"
            exit 1
          fi
          CL_DATE=$(echo "$CL_LINE" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
          if [[ "$CL_DATE" > "$TODAY" ]]; then
            echo "FAIL: CHANGELOG entry for $VERSION dated $CL_DATE (future)"
            exit 1
          fi
          echo "  CHANGELOG: $VERSION dated $CL_DATE"
          # Roadmap refresh recency: max 90 days.
          ROADMAP_DATE=$(grep -oE 'Last refresh: \*?\*?[0-9]{4}-[0-9]{2}-[0-9]{2}' docs/development/roadmap.md \
            | head -1 | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}')
          if [ -z "$ROADMAP_DATE" ]; then
            echo "FAIL: docs/development/roadmap.md has no 'Last refresh: YYYY-MM-DD' marker"
            exit 1
          fi
          # date arithmetic via epoch seconds
          AGE_DAYS=$(( ($(date -u +%s) - $(date -u -d "$ROADMAP_DATE" +%s)) / 86400 ))
          if [ "$AGE_DAYS" -gt 90 ]; then
            echo "FAIL: roadmap last refreshed $ROADMAP_DATE ($AGE_DAYS days ago, > 90)"
            exit 1
          fi
          echo "  Roadmap: refreshed $ROADMAP_DATE ($AGE_DAYS days ago)"
